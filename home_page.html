<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Diet Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #effaf1;
      --muted: #c2deca;
      --line: #84ba95;
      --green-1: #0c2116;
      --green-2: #173b28;
      --green-3: #24593d;
      --green-4: #3e7f5c;
      --btn-a: #b8efc7;
      --btn-b: #86d9a1;
      --btn-text: #123423;
      --frame-glow: rgba(137, 210, 157, 0.34);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: clamp(14px, 3vw, 28px);
      background:
        linear-gradient(rgba(10, 34, 21, 0.72), rgba(10, 34, 21, 0.86)),
        url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(153, 226, 174, 0.2), transparent 45%),
        radial-gradient(circle at 80% 90%, rgba(116, 188, 137, 0.24), transparent 46%);
      pointer-events: none;
    }

    .frame {
      width: min(100%, 760px);
      border: 3px solid var(--line);
      border-radius: 26px;
      padding: clamp(20px, 3.2vw, 34px) clamp(16px, 3.6vw, 28px) clamp(18px, 3vw, 32px);
      text-align: center;
      background: linear-gradient(160deg, rgba(14, 40, 27, 0.92), rgba(23, 59, 40, 0.8));
      box-shadow:
        0 0 0 2px rgba(201, 239, 211, 0.16) inset,
        0 18px 60px rgba(0, 0, 0, 0.45),
        0 0 40px var(--frame-glow);
      backdrop-filter: blur(5px);
      animation: frameRise 700ms ease-out;
    }

    .kicker {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      border: 1px solid rgba(198, 239, 210, 0.6);
      border-radius: 999px;
      padding: 5px 14px;
      color: #dbf5e2;
      margin-bottom: 14px;
      background: rgba(147, 219, 165, 0.14);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 10px;
      color: #f2fff4;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
    }

    .sub {
      color: var(--muted);
      font-size: clamp(14px, 2.3vw, 17px);
      margin-bottom: 24px;
    }

    .avatar-wrap {
      width: clamp(138px, 30vw, 190px);
      height: clamp(138px, 30vw, 190px);
      border-radius: 50%;
      margin: 0 auto 24px;
      padding: 6px;
      border: 2px solid rgba(212, 248, 225, 0.92);
      background: linear-gradient(135deg, #2d9062 0%, #1a5a3f 50%, #0f4630 100%);
      box-shadow:
        0 0 0 3px rgba(180, 140, 70, 0.48),
        0 0 0 5px rgba(86, 180, 137, 0.25),
        0 0 32px rgba(45, 144, 98, 0.45),
        0 0 60px rgba(180, 140, 70, 0.2),
        0 20px 48px rgba(0, 0, 0, 0.52);
      position: relative;
      animation: floatIn 1000ms ease-out;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(212, 175, 115, 0.35),
        rgba(100, 180, 140, 0.25),
        rgba(45, 144, 98, 0.2),
        rgba(212, 175, 115, 0.35)
      );
      z-index: -1;
      filter: blur(8px);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      border: 2px solid rgba(236, 252, 241, 0.86);
      display: block;
    }

    .cta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 4px;
    }

    .cta {
      text-decoration: none;
      color: var(--btn-text);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      background: linear-gradient(135deg, var(--btn-a), var(--btn-b));
      border: 2px solid rgba(229, 247, 234, 0.88);
      border-radius: 14px;
      padding: 14px 18px;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      box-shadow: 0 8px 20px rgba(89, 184, 118, 0.3);
    }

    .cta:hover {
      transform: translateY(-2px);
      filter: saturate(115%);
      box-shadow: 0 12px 24px rgba(89, 184, 118, 0.42);
    }

    @keyframes frameRise {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes floatIn {
      from {
        transform: translateY(10px) scale(0.96);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .cta-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .frame {
        border-radius: 20px;
      }

      h1 {
        line-height: 1.16;
      }

      .sub {
        margin-bottom: 18px;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .frame {
        border-width: 2px;
      }

      .cta {
        font-size: 14px;
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <h1>Family Diet Planner</h1>
    <p class="sub">Choose whose 7-day plan you want to open</p>

    <div class="avatar-wrap">
      <img
        class="avatar"
        src="image.png"
        alt="Family profile"
      >
    </div>

    <div class="cta-grid">
      <a class="cta" href="dad_diet.html">Open Dad Diet Plan</a>
      <a class="cta" href="mumma_diet.html">Open Mumma Diet Plan</a>
    </div>

  </main>
</body>
</html>
